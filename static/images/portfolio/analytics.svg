<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <rect width="400" height="240" fill="rgba(12,21,37,0.6)"/>

  <!-- App header bar -->
  <rect x="0" y="0" width="400" height="32" rx="0"
        fill="rgba(37,99,235,0.12)" stroke="#2563EB" stroke-width="0.5" opacity="0.7"/>
  <text x="16" y="21" font-family="'DM Mono',monospace" font-size="8.5"
        fill="#93B4F7" font-weight="600">Analytics Dashboard</text>
  <text x="200" y="21" text-anchor="middle" font-family="monospace" font-size="7"
        fill="#93B4F7" opacity="0.5">Databricks · Python · Power BI</text>
  <circle cx="378" cy="16" r="5" fill="#4ade80" opacity="0.75"/>
  <text x="372" y="12" font-family="monospace" font-size="5.5" fill="#4ade80" opacity="0.6">LIVE</text>

  <!-- KPI card 1 -->
  <rect x="14" y="44" width="110" height="56" rx="4"
        stroke="#2563EB" stroke-width="1" fill="rgba(37,99,235,0.09)"/>
  <text x="26" y="60" font-family="'DM Mono',monospace" font-size="7" fill="#93B4F7" opacity="0.6">EVENTS / DAY</text>
  <text x="26" y="84" font-family="'DM Mono',monospace" font-size="22" fill="#fff" font-weight="bold" letter-spacing="-1">5.2M</text>
  <text x="106" y="82" text-anchor="end" font-family="monospace" font-size="8" fill="#4ade80">↑12%</text>

  <!-- KPI card 2 -->
  <rect x="145" y="44" width="110" height="56" rx="4"
        stroke="#2563EB" stroke-width="1" fill="rgba(37,99,235,0.09)"/>
  <text x="157" y="60" font-family="'DM Mono',monospace" font-size="7" fill="#93B4F7" opacity="0.6">AVG LATENCY</text>
  <text x="157" y="84" font-family="'DM Mono',monospace" font-size="22" fill="#fff" font-weight="bold" letter-spacing="-1">&lt;1ms</text>
  <text x="247" y="82" text-anchor="end" font-family="monospace" font-size="8" fill="#4ade80">✓</text>

  <!-- KPI card 3 -->
  <rect x="276" y="44" width="110" height="56" rx="4"
        stroke="#2563EB" stroke-width="1" fill="rgba(37,99,235,0.09)"/>
  <text x="288" y="60" font-family="'DM Mono',monospace" font-size="7" fill="#93B4F7" opacity="0.6">PIPELINE SLA</text>
  <text x="288" y="84" font-family="'DM Mono',monospace" font-size="22" fill="#fff" font-weight="bold" letter-spacing="-1">99.9%</text>

  <!-- Chart container -->
  <rect x="14" y="114" width="372" height="106" rx="4"
        stroke="#2563EB" stroke-width="0.75" fill="rgba(37,99,235,0.04)" opacity="0.85"/>

  <!-- Y axis + grid lines -->
  <line x1="40" y1="126" x2="40"  y2="208" stroke="#2563EB" stroke-width="0.75" opacity="0.2"/>
  <line x1="40" y1="126" x2="378" y2="126" stroke="#2563EB" stroke-width="0.5"  opacity="0.12"/>
  <line x1="40" y1="147" x2="378" y2="147" stroke="#2563EB" stroke-width="0.5"  opacity="0.08"/>
  <line x1="40" y1="168" x2="378" y2="168" stroke="#2563EB" stroke-width="0.5"  opacity="0.08"/>
  <line x1="40" y1="189" x2="378" y2="189" stroke="#2563EB" stroke-width="0.5"  opacity="0.08"/>
  <line x1="40" y1="208" x2="378" y2="208" stroke="#2563EB" stroke-width="0.5"  opacity="0.12"/>

  <!-- Y axis labels -->
  <text x="36" y="129" text-anchor="end" font-family="monospace" font-size="5.5" fill="#2563EB" opacity="0.4">8M</text>
  <text x="36" y="150" text-anchor="end" font-family="monospace" font-size="5.5" fill="#2563EB" opacity="0.4">6M</text>
  <text x="36" y="171" text-anchor="end" font-family="monospace" font-size="5.5" fill="#2563EB" opacity="0.4">4M</text>
  <text x="36" y="192" text-anchor="end" font-family="monospace" font-size="5.5" fill="#2563EB" opacity="0.4">2M</text>

  <!-- Chart area fill -->
  <path d="M40 196 L80 184 L130 190 L180 170 L230 175 L280 156 L330 161 L378 142 L378 208 L40 208 Z"
        fill="rgba(37,99,235,0.13)"/>
  <!-- Secondary area (second series) -->
  <path d="M40 200 L80 194 L130 197 L180 185 L230 188 L280 178 L330 182 L378 168 L378 208 L40 208 Z"
        fill="rgba(96,165,250,0.08)"/>

  <!-- Primary line -->
  <polyline points="40,196 80,184 130,190 180,170 230,175 280,156 330,161 378,142"
            stroke="#60a5fa" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <!-- Secondary line -->
  <polyline points="40,200 80,194 130,197 180,185 230,188 280,178 330,182 378,168"
            stroke="#2563EB" stroke-width="1.25"
            stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>

  <!-- Data dots on primary line -->
  <circle cx="40"  cy="196" r="2.5" fill="#60a5fa"/>
  <circle cx="130" cy="190" r="2.5" fill="#60a5fa"/>
  <circle cx="230" cy="175" r="2.5" fill="#60a5fa"/>
  <circle cx="330" cy="161" r="2.5" fill="#60a5fa"/>
  <circle cx="378" cy="142" r="2.5" fill="#60a5fa"/>

  <!-- X axis labels -->
  <text x="40"  y="220" text-anchor="middle" font-family="monospace" font-size="6" fill="#2563EB" opacity="0.4">MON</text>
  <text x="110" y="220" text-anchor="middle" font-family="monospace" font-size="6" fill="#2563EB" opacity="0.4">TUE</text>
  <text x="180" y="220" text-anchor="middle" font-family="monospace" font-size="6" fill="#2563EB" opacity="0.4">WED</text>
  <text x="250" y="220" text-anchor="middle" font-family="monospace" font-size="6" fill="#2563EB" opacity="0.4">THU</text>
  <text x="320" y="220" text-anchor="middle" font-family="monospace" font-size="6" fill="#2563EB" opacity="0.4">FRI</text>
  <text x="378" y="220" text-anchor="middle" font-family="monospace" font-size="6" fill="#2563EB" opacity="0.4">SAT</text>
</svg>

  <text x="313" y="108" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#4ade80">Approved</text>

  <!-- ── Row 2 (pending) ── -->
  <rect x="14" y="120" width="372" height="30" fill="rgba(37,99,235,0.055)"/>
  <text x="26"  y="139" font-family="monospace" font-size="8.5" fill="#E8EDF5">Lars Moen</text>
  <text x="126" y="139" font-family="monospace" font-size="7.5" fill="#93B4F7">Sick Leave</text>
  <text x="210" y="139" font-family="monospace" font-size="7.5" fill="#93B4F7">Jan 20 – 21</text>
  <rect x="284" y="127" width="60" height="16" rx="8"

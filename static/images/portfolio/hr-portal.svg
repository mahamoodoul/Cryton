  <text x="314" y="138" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#fbbf24">Pending</text>
  <rect x="352" y="127" width="28" height="16" rx="3"
        fill="rgba(37,99,235,0.35)" stroke="#2563EB" stroke-width="0.75"/>
  <text x="366" y="138" text-anchor="middle" font-family="monospace" font-size="8" fill="#93B4F7">→</text>

  <!-- ── Row 3 (approved) ── -->
  <rect x="14" y="150" width="372" height="30" fill="rgba(37,99,235,0.03)"/>
  <text x="26"  y="169" font-family="monospace" font-size="8.5" fill="#E8EDF5">Kari Holm</text>
  <text x="126" y="169" font-family="monospace" font-size="7.5" fill="#93B4F7">Remote Work</text>
  <text x="210" y="169" font-family="monospace" font-size="7.5" fill="#93B4F7">Jan 22 – 26</text>
  <rect x="286" y="157" width="54" height="16" rx="8"
        fill="rgba(74,222,128,0.14)" stroke="#4ade80" stroke-width="0.75"/>
  <text x="313" y="168" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#4ade80">Approved</text>

  <!-- ── Row 4 (pending) ── -->
  <rect x="14" y="180" width="372" height="30" fill="rgba(37,99,235,0.055)"/>
  <text x="26"  y="199" font-family="monospace" font-size="8.5" fill="#E8EDF5">Erik Dahl</text>
  <text x="126" y="199" font-family="monospace" font-size="7.5" fill="#93B4F7">Annual Leave</text>
  <text x="210" y="199" font-family="monospace" font-size="7.5" fill="#93B4F7">Feb 3 – 7</text>
  <rect x="284" y="187" width="60" height="16" rx="8"
        fill="rgba(251,191,36,0.12)" stroke="#fbbf24" stroke-width="0.75"/>
  <text x="314" y="198" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#fbbf24">Pending</text>
  <rect x="352" y="187" width="28" height="16" rx="3"
        fill="rgba(37,99,235,0.35)" stroke="#2563EB" stroke-width="0.75"/>
  <text x="366" y="198" text-anchor="middle" font-family="monospace" font-size="8" fill="#93B4F7">→</text>

  <!-- Row dividers -->
  <line x1="14" y1="90"  x2="386" y2="90"  stroke="#2563EB" stroke-width="0.5" opacity="0.18"/>
  <line x1="14" y1="120" x2="386" y2="120" stroke="#2563EB" stroke-width="0.5" opacity="0.18"/>
  <line x1="14" y1="150" x2="386" y2="150" stroke="#2563EB" stroke-width="0.5" opacity="0.18"/>
  <line x1="14" y1="180" x2="386" y2="180" stroke="#2563EB" stroke-width="0.5" opacity="0.18"/>

  <!-- ── Footer status bar ── -->
  <rect x="14" y="218" width="372" height="16" rx="2"
        fill="rgba(37,99,235,0.06)" stroke="#2563EB" stroke-width="0.5" opacity="0.4"/>
  <text x="200" y="229" text-anchor="middle"
        font-family="monospace" font-size="6.5" fill="#93B4F7" opacity="0.6">

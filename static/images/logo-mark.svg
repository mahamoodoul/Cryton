<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Angular C-bracket — top arm, left vertical, bottom arm -->
  <path d="M22 5 L9 5 L9 27 L22 27"
        stroke="#2563EB" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Endpoint nodes -->
  <circle cx="22" cy="5"  r="2.5" fill="#2563EB"/>
  <circle cx="22" cy="27" r="2.5" fill="#2563EB"/>
  <!-- Middle circuit tick -->
  <line x1="9" y1="16" x2="17" y2="16"
        stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <circle cx="17" cy="16" r="1.5" fill="#2563EB" opacity="0.45"/>
</svg>
